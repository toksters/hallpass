<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hallpass</title>
  <link rel="stylesheet" href="block.css">
</head>
<body>
  <div class="container">
    <header>
      <h1 class="logo">Hallpass</h1>
      <p class="subtitle">Answer to continue to <span id="site-name"></span></p>
    </header>

    <div id="no-cards-state" class="state" style="display: none;">
      <div class="message-box">
        <p>No flashcard decks imported yet.</p>
        <p>Go to <a id="options-link" href="#">Hallpass Settings</a> to import an Anki deck and configure blocked sites.</p>
      </div>
    </div>

    <div id="card-state" class="state" style="display: none;">
      <div class="progress-bar">
        <span id="progress-text">Card 1 of 1</span>
      </div>

      <div class="carousel">
        <div id="completed-cards" class="completed-cards"></div>

        <div class="current-card-area">
          <div class="card" id="active-card">
            <div class="card-label">Translate / Answer:</div>
            <div id="card-front" class="card-front"></div>

            <div id="correct-overlay" class="correct-overlay" style="display: none;">
              <div class="correct-heading">Correct!</div>
              <div id="correct-fields" class="correct-fields"></div>
              <div class="countdown-track">
                <div id="countdown-bar" class="countdown-bar"></div>
              </div>
              <div class="skip-hint">Click to skip</div>
            </div>
          </div>

          <form id="answer-form">
            <input
              type="text"
              id="answer-input"
              placeholder="Type your answer..."
              autocomplete="off"
              autofocus
            />
            <button type="submit" id="submit-btn">Check</button>
          </form>

          <div id="feedback" class="feedback" style="display: none;"></div>

          <div id="show-answer-container" style="display: none;">
            <button id="show-answer-btn" class="btn-secondary">Show Answer</button>
          </div>

          <div id="answer-revealed" class="answer-revealed" style="display: none;">
            <div class="card-label">Answer:</div>
            <div id="card-back"></div>
            <button id="continue-btn" class="btn-primary">I see, continue</button>
          </div>
        </div>
      </div>
    </div>

    <div id="summary-state" class="state" style="display: none;">
      <p class="summary-heading">All done!</p>
      <p class="summary-subtitle">Redirecting to <span id="summary-site"></span>...</p>
      <div id="summary-cards" class="summary-cards"></div>
    </div>
  </div>

  <script src="src/storage.js"></script>
  <script src="src/srs.js"></script>
  <script src="src/card-selector.js"></script>
  <script src="block.js"></script>
</body>
</html>
